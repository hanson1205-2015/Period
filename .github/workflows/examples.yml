name: Run Examples

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  examples:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Period
        working-directory: period
        run: cargo build

      - name: Run example programs
        shell: bash
        run: .github/scripts/run_examples.sh
