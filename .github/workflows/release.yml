name: Release Windows Installer

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Extract version from tag
        id: ver
        shell: bash
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "file_version=$VERSION.0" >> "$GITHUB_OUTPUT"

      - name: Apply version to installer script
        shell: pwsh
        run: |
          $ver = "${{ steps.ver.outputs.version }}"
          (Get-Content installer\period.iss) -replace '#define MyAppVersion "[^"]*"', "#define MyAppVersion `"$ver`"" | Set-Content installer\period.iss

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Period executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path dist
          cd period
          cargo build --release
          Copy-Item ..\period\target\release\period.exe ..\dist\period.exe

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Set VS Code extension version from tag
        working-directory: vscode-extension
        run: npm run set-version

      - name: Install vsce and package extension
        working-directory: vscode-extension
        run: |
          npm install
          npx @vscode/vsce package --allow-missing-repository -o period-language.vsix

      - name: Install Inno Setup
        run: choco install innosetup --yes

      - name: Locate signtool
        id: signtool
        shell: pwsh
        run: |
          $tool = Get-ChildItem -Path "C:\Program Files (x86)\Windows Kits" -Recurse -Filter signtool.exe -ErrorAction SilentlyContinue |
                  Select-Object -First 1
          if (-not $tool) {
            Write-Error "signtool.exe not found. Make sure Windows SDK is available on the runner."
          }
          echo "path=$($tool.FullName)" >> "$env:GITHUB_OUTPUT"

      - name: Decode code signing certificate
        shell: pwsh
        env:
          CERT_BASE64: ${{ secrets.CODE_SIGNING_CERT }}
        run: |
          if ([string]::IsNullOrWhiteSpace($env:CERT_BASE64)) { exit 0 }
          $bytes = [Convert]::FromBase64String($env:CERT_BASE64)
          [IO.File]::WriteAllBytes("$env:RUNNER_TEMP\code-signing.pfx", $bytes)

      - name: Build signed installer
        shell: pwsh
        env:
          CERT_PASSWORD: ${{ secrets.CODE_SIGNING_PASSWORD }}
        run: |
          $signtool = "${{ steps.signtool.outputs.path }}"
          $cert = "$env:RUNNER_TEMP\code-signing.pfx"
          if (Test-Path $cert) {
            (Get-Content installer\period.iss -Raw) -replace '(\[Setup\]\r?\n)', "`$1SignTool=signtool `$p`r`n" | Set-Content installer\period.iss -NoNewline
            $signcmd = "`"$signtool`" sign /f `"$cert`" /p `"$env:CERT_PASSWORD`" /tr http://timestamp.digicert.com /td sha256 /fd sha256 `"$f`""
            & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /Ssigntool="$signcmd" installer\period.iss
          } else {
            Write-Warning "No code signing certificate found; building unsigned installer."
            & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\period.iss
          }

      - name: Upload installer to release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            dist/Period-Setup.exe
            vscode-extension/period-language.vsix
          fail_on_unmatched_files: true
          generate_release_notes: true
