name: Release Windows Installer

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    runs-on: windows-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Python dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Build compiler executable with Nuitka
        run: |
          python -m nuitka --standalone --onefile --assume-yes-for-downloads --windows-icon-from-ico=assets/period.ico --company-name="Period Language" --product-name="Period" --file-version=1.0.2.0 --product-version=1.0.2.0 --output-dir=dist --output-filename=period compiler.py

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install vsce and package extension
        working-directory: vscode-extension
        run: |
          npm install
          npx @vscode/vsce package --allow-missing-repository -o period-language.vsix

      - name: Install Inno Setup
        run: choco install innosetup --yes

      - name: Build installer
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" installer\period.iss

      - name: Upload installer to release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            dist/Period-Setup.exe
            vscode-extension/period-language.vsix
          fail_on_unmatched_files: true
